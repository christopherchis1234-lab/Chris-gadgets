<script>
    // 1. CONFIRM YOUR LINK AND NUMBER ARE SITTING DIRECTLY WITHIN THESE QUOTES
    const SHEET_CSV_URL = "PASTE_YOUR_COPIED_GOOGLE_SHEET_CSV_URL_HERE";
    const WHATSAPP_NUMBER = "YOUR_PHONE_NUMBER_HERE"; 

    async function fetchInventory() {
        const grid = document.getElementById('product-grid');
        
        try {
            // Guard clause if user forgot to change the placeholder link
            if (SHEET_CSV_URL.includes("PASTE_YOUR_COPIED")) {
                grid.innerHTML = "<p style='color:red; text-align:center; grid-column:1/-1;'>Configuration Error: Please paste your real Google Sheet link inside the code.</p>";
                return;
            }

            const response = await fetch(SHEET_CSV_URL);
            if (!response.ok) throw new Error('Failed to reach Google Sheets');
            
            const rawData = await response.text();
            
            // Clean up invisible carriage returns (\r) across different operating systems
            const cleanData = rawData.replace(/\r/g, "");
            const lines = cleanData.split('\n');
            
            let htmlContent = '';
            let validProductCount = 0;

            // Loop starts at index 1 to completely ignore the Row 1 Header text
            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].trim();
                if (currentLine === '') continue; // Skip completely empty lines

                // Split by comma
                const columns = currentLine.split(',');
                
                // Extract columns carefully
                const name = columns[0] ? columns[0].trim() : '';
                const price = columns[1] ? columns[1].trim() : '';
                const image = columns[2] ? columns[2].trim() : '';

                // Skip processing if name or price field is completely absent
                if (!name || !price) continue;

                validProductCount++;

                // Build modern image block or handle clean text placeholder fallback
                const imageHtml = (image !== '') 
                    ? `<img src="${image}" class="product-img" alt="${name}">`
                    : `<div class="product-img" style="background:#e8e8ed; height:220px; display:flex; align-items:center; justify-content:center; color:#86868b; text-align:center; padding:10px;">⚡ ${name} Placeholder</div>`;

                // Append perfectly formatted HTML string
                htmlContent += `
                    <div class="card">
                        ${imageHtml}
                        <div class="card-details">
                            <h3>${name}</h3>
                            <p class="price" style="color:#0071e3; font-size:1.3rem; font-weight:bold; margin-bottom:15px;">${price}</p>
                            <button class="btn-order" onclick="sendOrder('${name.replace(/'/g, "\\'")}', '${price.replace(/'/g, "\\'")}')">
                                Order via WhatsApp
                            </button>
                        </div>
                    </div>
                `;
            }

            // UI feedback assessment
            if (validProductCount === 0) {
                grid.innerHTML = `<p style='text-align:center; grid-column:1/-1; padding:20px;'>Connected to Sheet! However, no valid items were found below row 1. Check your spelling.</p>`;
            } else {
                grid.innerHTML = htmlContent;
            }

        } catch (error) {
            console.error(error);
            grid.innerHTML = `<p style='text-align:center; color:#ff4d4d; grid-column:1/-1; padding:20px;'>⚠️ Connection Error: Website cannot fetch data. Please re-verify your 'Publish to Web' settings in Google Sheets.</p>`;
        }
    }

    function sendOrder(productName, price) {
        if (WHATSAPP_NUMBER.includes("YOUR_PHONE")) {
            alert("Please input your real WhatsApp number into the code configuration line.");
            return;
        }
        const message = `Hello Chris Gadgets, I want to order:\n\n🛍️ ${productName}\n💰 Price: ${price}`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
    }

    // Fire off execution loop
    fetchInventory();
</script>
